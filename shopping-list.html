<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #718096;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: #718096;
    }

    .clear-done {
      background: none;
      border: none;
      color: #e53e3e;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
    }

    .clear-done:hover { text-decoration: underline; }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #f7fafc;
      border-radius: 10px;
      border: 2px solid transparent;
      transition: all 0.2s;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li:hover { border-color: #e2e8f0; }

    li.done {
      background: #f0fff4;
      opacity: 0.7;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #48bb78;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-word;
    }

    li.done .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    li .delete-btn:hover { color: #e53e3e; }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .empty span { display: block; font-size: 2rem; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle">오늘 구매할 항목을 추가해보세요</p>

    <div class="input-row">
      <input id="itemInput" type="text" placeholder="항목 입력..." maxlength="80">
      <button onclick="addItem()">+</button>
    </div>

    <div class="stats">
      <span id="statsText">항목 없음</span>
      <button class="clear-done" onclick="clearDone()">완료 항목 삭제</button>
    </div>

    <ul id="list"></ul>
    <div class="empty" id="emptyMsg">
      <span>🛍️</span>항목을 추가하면 여기에 표시됩니다
    </div>
  </div>

  <script>
    const input = document.getElementById('itemInput');
    const list  = document.getElementById('list');
    const emptyMsg = document.getElementById('emptyMsg');
    const statsText = document.getElementById('statsText');

    let items = JSON.parse(localStorage.getItem('shopping') || '[]');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    function save() {
      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function render() {
      list.innerHTML = '';
      emptyMsg.style.display = items.length ? 'none' : 'block';

      const done  = items.filter(i => i.done).length;
      const total = items.length;
      statsText.textContent = total
        ? `${total}개 항목 · ${done}개 완료`
        : '항목 없음';

      items.forEach((item, idx) => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('done');

        li.innerHTML = `
          <input type="checkbox" ${item.done ? 'checked' : ''}
                 onchange="toggle(${idx})">
          <span class="item-text">${escHtml(item.text)}</span>
          <button class="delete-btn" onclick="remove(${idx})" title="삭제">✕</button>
        `;
        list.appendChild(li);
      });
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) { input.focus(); return; }
      items.unshift({ text, done: false });
      input.value = '';
      save(); render();
      input.focus();
    }

    function toggle(idx) {
      items[idx].done = !items[idx].done;
      save(); render();
    }

    function remove(idx) {
      items.splice(idx, 1);
      save(); render();
    }

    function clearDone() {
      items = items.filter(i => !i.done);
      save(); render();
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    render();
  </script>
</body>
</html>
